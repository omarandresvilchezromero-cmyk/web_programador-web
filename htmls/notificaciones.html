<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificaciones - Plataforma Técnica</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/notificaciones.css">
</head>

<body>
    <header class="header-main">
        <div class="logo">
            <img src="Diseño sin título.png" alt="Logo">
        </div>
        <nav>
            <ul class="nav-list">
                <li><a href="perfil.html">Perfil</a></li>
                <li><a href="vacantes de trabajo.html">Vacante</a></li>
                <li><a href="contactosalservidores.html">Contactos</a></li>
                <li><a href="chat.html" class="nav-icon-mensajes" id="navMensajes">💬 <span id="badgeMensajes" style="display:none;background:#ef4444;color:white;padding:2px 6px;border-radius:10px;margin-left:6px;font-size:0.8rem;"></span></a></li>
                <li><a href="notificaciones.html" class="nav-icon-notificaciones" id="navNotificaciones">🔔 <span id="badgeNotificaciones" style="display:none;background:#ef4444;color:white;padding:2px 6px;border-radius:10px;margin-left:6px;font-size:0.8rem;"></span></a></li>
                <li><a href="admin-dashboard.html" class="nav-admin-link" id="navAdmin" style="display:none;">⚙️</a></li>
                <li><a href="#" onclick="logout(event)" class="nav-logout" id="navLogout" style="display:none;">🚪</a></li>
            </ul>
        </nav>
    </header>

    <main class="notification-center">
        <div class="notification-header">
            <h1>Centro de Notificaciones</h1>
            <p>Aquí encontrarás todos tus eventos y actualizaciones</p>
        </div>

        <div class="notification-tabs">
            <button class="notification-tab-btn active" onclick="filtrarNotificaciones('todas', event)">
                Todas
            </button>
            <button class="notification-tab-btn" onclick="filtrarNotificaciones('mensajes', event)">
                💬 Mensajes
            </button>
            <button class="notification-tab-btn" onclick="filtrarNotificaciones('sistema', event)">
                🔔 Sistema
            </button>
            <button class="notification-tab-btn" onclick="filtrarNotificaciones('admin', event)" id="tabAdmin" style="display:none;">
                ⚙️ Administrativo
            </button>
        </div>

        <!-- Panel de Solicitudes de Empleo (solo admin) -->
        <div id="adminSolicitudesPanel" style="display:none; margin: 30px 0;">
            <div style="background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 20px; padding: 30px; box-shadow: 0 10px 40px rgba(15, 23, 42, 0.3);">
                <h2 style="color: #22d3ee; margin-top: 0; display: flex; align-items: center; gap: 10px;">
                    📋 Solicitudes de Empleo
                    <span id="badgeSolicitudesPendientes" style="background: #ef4444; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.9rem;"></span>
                </h2>
                <div id="solicitudesList" style="display: grid; gap: 20px; margin-top: 20px;">
                    <!-- Se cargará con JavaScript -->
                </div>
            </div>
        </div>

        <div style="margin-bottom: 20px; text-align: center;">
            <button onclick="marcarTallasComoLeidas()" style="
                background: linear-gradient(135deg, #7C3AED, #22D3EE);
                border: none;
                color: white;
                padding: 10px 20px;
                border-radius: 8px;
                cursor: pointer;
                font-weight: 600;
                transition: all 0.3s ease;
                margin-right: 10px;
            " onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
                ✓ Marcar todas como leídas
            </button>
            <button onclick="limpiarNotificaciones()" style="
                background: rgba(239,68,68,0.2);
                border: 1px solid rgba(239,68,68,0.5);
                color: #EF4444;
                padding: 10px 20px;
                border-radius: 8px;
                cursor: pointer;
                font-weight: 600;
                transition: all 0.3s ease;
            " onmouseover="this.style.background='rgba(239,68,68,0.3)'" onmouseout="this.style.background='rgba(239,68,68,0.2)'">
                🗑️ Limpiar
            </button>
        </div>

        <div class="notification-list" id="notificationList">
            <!-- Se cargará con JavaScript -->
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="main-footer">
        <div class="footer-top">
            <p>© 2026 - Omar Vílchez</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="javascript/auth-client.js"></script>
    <script src="javascript/sistema-usuarios.js"></script>
    <script src="javascript/sistema-notificaciones.js"></script>
    <script src="javascript/sistema-mensajeria.js"></script>
    <script src="javascript/inicializador.js"></script>
    <script src="javascript/notificaciones.js"></script>
    <script src="javascript/admin-solicitudes.js"></script>
</body>

</html>
